version: '3.8'

services:
  db:
    image: postgres:15
    container_name: saas_pg
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: saas_ai_email
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: saas_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
